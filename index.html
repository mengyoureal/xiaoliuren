<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>地球Online - 系统推演终端</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/lunar-javascript@1.2.37/lunar.min.js"></script>
  <script src="https://cdn.bootcdn.net/ajax/libs/blueimp-md5/2.16.0/js/md5.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#2DD4BF", 
            secondary: "#818CF8", 
            bgStart: "#020617", 
            bgEnd: "#0F172A",   
          },
          fontFamily: {
            sans: ["PingFang SC", "Microsoft YaHei", "sans-serif"],
          },
          animation: {
            "fade-in": "fadeIn 0.8s ease-in-out",
            "slide-up": "slideUp 0.6s ease-out",
            "scroll-left": "scrollLeft 60s linear infinite",
          },
          keyframes: {
            scrollLeft: {
              '0%': { transform: 'translateX(0)' },
              '100%': { transform: 'translateX(-50%)' },
            }
          }
        },
      },
    };
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
        .text-cyan-glow { color: #2DD4BF; text-shadow: 0 0 10px rgba(45, 212, 191, 0.4); }
        .bg-system { background: radial-gradient(circle at top center, #0F172A 0%, #020617 100%); }
        .card-terminal { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(45, 212, 191, 0.15); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5); }
    }
    body { background-color: #020617; color: #E2E8F0; -webkit-tap-highlight-color: transparent; }
    .scan-line { width: 100%; height: 1px; background: rgba(45, 212, 191, 0.1); position: absolute; animation: scan 4s linear infinite; }
    @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
  </style>
</head>

<body class="bg-system min-h-screen font-sans">

  <!-- 顶部状态栏 -->
  <div class="fixed top-0 w-full z-50 bg-[#020617]/80 backdrop-blur-md border-b border-cyan-500/10">
    <div class="max-w-md mx-auto px-4 h-14 flex items-center justify-between">
      <div class="flex items-center">
        <span class="text-lg mr-2 text-cyan-glow"><i class="fa fa-terminal"></i></span>
        <span class="font-bold text-cyan-glow tracking-[0.1em] text-sm font-mono">EARTH ONLINE 终端</span>
      </div>
      <div id="connectionStatus" class="flex items-center text-[10px] text-emerald-400">
          <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full mr-2 animate-pulse"></span>
          节点正常
      </div>
    </div>
  </div>

  <!-- 主容器 -->
  <div class="max-w-md mx-auto pt-20 pb-24 px-4 relative">
    
    <!-- 标题 -->
    <div class="text-center mb-6 animate-fade-in">
      <h1 class="text-4xl font-black text-cyan-glow mb-1 tracking-tighter italic">因果模拟器</h1>
      <p class="text-slate-500 text-[9px] tracking-[0.2em] font-mono">REALITY SIMULATOR VER 1.0.4</p>
    </div>

    <!-- 服务器参数 -->
    <div class="card-terminal rounded-lg p-3 mb-6 text-[10px] font-mono border-l-2 border-l-cyan-500">
        <div class="flex justify-between text-slate-400">
            <div>[时空] <span id="solarDate" class="text-slate-200"></span></div>
            <div>[版本] <span class="text-cyan-500">2025.01.27</span></div>
        </div>
        <div class="mt-1">[位面] <span id="lunarDate" class="text-slate-200"></span></div>
    </div>

    <!-- 输入指令区 -->
    <div id="inputSection">
      <div class="card-terminal rounded-2xl p-6 relative overflow-hidden">
        <div class="scan-line"></div>
        <div class="flex items-center mb-4">
            <h3 class="text-xs font-bold text-cyan-400 tracking-widest uppercase">录入待解析副本数据 ></h3>
        </div>
        <textarea id="questionInput" 
          placeholder="在此输入您的疑惑...
例如：
• 这一份工作该不该换？
• 刚才遇到的那个选择会有什么后果？
• 这个月的财运资源包如何优化？"
          class="w-full h-40 bg-black/30 border border-cyan-500/10 rounded-xl p-4 text-cyan-50 focus:border-cyan-400/40 outline-none transition-all placeholder-slate-700 text-sm resize-none"></textarea>
        
        <div class="mt-6">
            <button onclick="startAnalysisFlow()"
              class="w-full bg-cyan-600 hover:bg-cyan-500 text-black font-black py-4 rounded-xl shadow-[0_0_20px_rgba(6,182,212,0.3)] active:scale-[0.98] transition-all flex items-center justify-center group">
              <span class="tracking-[0.5em] text-sm">运行因果推演</span>
            </button>
            <div class="flex justify-between items-center mt-4 px-1">
                <span class="text-[9px] text-slate-600 font-mono italic">RUNNING_THREADS: 128</span>
                <span class="text-[9px] text-slate-600 font-mono">已有 <span id="visitorCount">1,024</span> 名玩家解析</span>
            </div>
        </div>
      </div>
    </div>

    <!-- 推演加载 -->
    <div id="loadingState" class="hidden py-20 text-center">
        <div class="w-10 h-10 border-2 border-cyan-500/10 border-t-cyan-500 rounded-full animate-spin mx-auto mb-6"></div>
        <p class="text-cyan-400 text-lg font-bold tracking-widest">正在挂载位面参数...</p>
        <p class="text-slate-500 text-[10px] animate-pulse mt-2" id="loadingText">正在计算当前时空负载...</p>
    </div>

    <!-- 结果展示区 -->
    <div id="resultSection" class="hidden animate-fade-in space-y-4">
        
        <!-- 位面参数判定 -->
        <div class="card-terminal rounded-xl p-4">
            <div class="grid grid-cols-3 gap-2 text-center font-mono">
                <div class="bg-black/40 py-3 rounded border border-cyan-500/10">
                    <div class="text-[8px] text-slate-500 mb-1">初始位面</div>
                    <div class="text-base font-bold text-white" id="teaserGod1">--</div>
                </div>
                <div class="bg-black/40 py-3 rounded border border-cyan-500/10">
                    <div class="text-[8px] text-slate-500 mb-1">因果参数</div>
                    <div class="text-base font-bold text-white" id="teaserGod2">--</div>
                </div>
                <div class="bg-black/40 py-3 rounded border border-cyan-500/10">
                    <div class="text-[8px] text-slate-500 mb-1">演化判定</div>
                    <div class="text-base font-bold text-white" id="teaserGod3">--</div>
                </div>
            </div>
        </div>

        <!-- 完整报告内容 -->
        <div class="card-terminal rounded-xl p-6 space-y-6">
            <div id="fullReport">
                <!-- 第一部分：系统判定 -->
                <div class="mb-6">
                    <div class="text-cyan-400 text-[10px] mb-2 font-mono tracking-widest uppercase flex items-center">
                        <span class="w-1 h-3 bg-cyan-400 mr-2"></span> 系统模拟判定报告
                    </div>
                    <div id="freeAnalysisContent" class="text-slate-200 text-sm leading-8 text-justify">
                        <!-- AI内容注入点 -->
                    </div>
                </div>

                <!-- 第二部分：高维策略 (以前是锁定的，现在直接显示) -->
                <div class="pt-6 border-t border-cyan-500/10">
                    <div class="text-cyan-400 text-[10px] mb-4 font-mono tracking-widest uppercase flex items-center">
                        <span class="w-1 h-3 bg-cyan-400 mr-2"></span> 开发者突破策略建议
                    </div>
                    <div id="paidAnalysisContent" class="text-slate-300 text-sm leading-8 text-justify">
                        <!-- AI内容注入点 -->
                    </div>
                </div>
            </div>
        </div>

        <!-- 赞助支持板块 (显示在最后) -->
        <div id="sponsorshipSection" class="card-terminal rounded-xl p-6 border-t-2 border-t-cyan-500/30">
            <div class="text-center mb-6">
                <i class="fa fa-coffee text-cyan-400 text-xl mb-3"></i>
                <h3 class="text-sm font-bold text-white">觉得推演结果有参考价值？</h3>
                <p class="text-[10px] text-slate-500 mt-1">赞助 1.68 元或更多，支持系统维护与AI算力</p>
            </div>
            
            <div class="grid grid-cols-2 gap-4 mb-4">
                <button onclick="startPayment('1.68')" class="bg-black/40 border border-cyan-500/20 hover:border-cyan-400 text-white py-3 rounded-xl transition-all active:scale-95 group">
                    <span class="block text-cyan-400 font-bold text-lg">¥ 1.68</span>
                    <span class="text-[9px] text-slate-500">赞助：微光</span>
                </button>
                <button onclick="startPayment('8.88')" class="bg-cyan-500/10 border border-cyan-400 text-white py-3 rounded-xl transition-all active:scale-95 relative overflow-hidden">
                    <div class="absolute top-0 right-0 bg-cyan-400 text-black font-black text-[7px] px-1.5">能量</div>
                    <span class="block text-white font-bold text-lg">¥ 8.88</span>
                    <span class="text-[9px] text-cyan-400/80">赞助：核心</span>
                </button>
            </div>
            <p class="text-center text-[9px] text-slate-700 italic">支付宝安全协议已加密 · 感谢您的支持</p>
        </div>

        <!-- 操作按钮 -->
        <div class="flex space-x-3 pt-2 pb-8">
            <button onclick="copyResult()" class="flex-1 bg-slate-800/30 border border-slate-700 text-slate-400 py-3 rounded-xl text-xs hover:text-white transition-colors">
                拷贝完整推演日志
            </button>
            <button onclick="location.href=location.pathname" class="flex-1 bg-cyan-500/5 border border-cyan-500/20 text-cyan-400 py-3 rounded-xl text-xs hover:bg-cyan-500/10 transition-colors">
                重置模拟器
            </button>
        </div>
    </div>
    
    <!-- 底部战报 -->
    <div class="fixed bottom-0 left-0 right-0 bg-[#020617]/95 backdrop-blur border-t border-cyan-500/10 py-1.5 z-40">
        <div class="relative w-full overflow-hidden h-4">
            <div id="marqueeContent" class="absolute whitespace-nowrap animate-scroll-left text-[8px] text-slate-600 font-mono flex items-center space-x-12 px-4">
                <!-- 动态生成 -->
            </div>
        </div>
    </div>
  </div>

  <script>
    // --- 核心配置 ---
    const CONFIG = {
        apiToken: "sk-zhkdhbaohshweaxxzxlvvucvklmlwsepbzmmghkxxkrfwpli", 
        paymentId: "2025111020404744", 
        paymentKey: "6Ecg3jrd3W4jcOADKclHaU0N5AsWftbB", 
        notifyUrl: "http://www.xiaoliuren.xyz", 
        submitUrl: "https://z-pay.cn/submit.php"
    };

    const NINE_GODS = [
      { name: "大安", type: "稳" }, { name: "留连", type: "滞" }, { name: "速喜", type: "快" },
      { name: "赤口", type: "争" }, { name: "小吉", type: "顺" }, { name: "空亡", type: "虚" },
      { name: "病符", type: "瑕" }, { name: "桃花", type: "缘" }, { name: "天德", type: "佑" }
    ];
    const SHICHEN = ["子", "丑", "寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥"];

    let currentStages = []; 
    let userQuestion = "";  

    document.addEventListener("DOMContentLoaded", function () {
      updateTimeDisplay();
      generateDailyVisitorCount();
      generateRealisticMarquee();
      checkPaymentResult();
    });

    function generateDailyVisitorCount() {
        const count = 1250 + Math.floor(Math.random() * 400);
        document.getElementById("visitorCount").innerText = count.toLocaleString();
    }

    function generateRealisticMarquee() {
        const actions = ["赞助了1.68元", "完成了深度模拟", "赞助了核心能量", "同步了位面因果参数", "获取了副本最优策略"];
        let contentHtml = "";
        for (let i = 0; i < 20; i++) {
            const userId = (Math.floor(Math.random()*9)+1) + "***" + Math.floor(Math.random()*9);
            const action = actions[Math.floor(Math.random() * actions.length)];
            contentHtml += `<span class="flex items-center uppercase tracking-tighter">[LOG] 玩家 ${userId} ${action} 成功...</span>`;
        }
        document.getElementById("marqueeContent").innerHTML = contentHtml + contentHtml;
    }

    // --- 算法逻辑 ---
    function updateTimeDisplay() {
        const now = new Date();
        const solar = Solar.fromDate(now);
        const lunar = solar.getLunar();
        
        document.getElementById("solarDate").innerText = `${solar.getYear()}-${solar.getMonth()}-${solar.getDay()} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
        
        const hour = now.getHours();
        let shichenIdx = Math.floor((hour + 1) / 2) % 12;
        const shichenName = SHICHEN[shichenIdx] + "时";
        document.getElementById("lunarDate").innerText = `LV-${lunar.getMonth()}.${lunar.getDay()} / ${shichenName}`;
        
        const m = Math.abs(lunar.getMonth()); 
        const d = lunar.getDay();
        const t = shichenIdx + 1; 
        
        const s1 = (m - 1) % 9;
        const s2 = (s1 + d - 1) % 9;
        const s3 = (s2 + t - 1) % 9;
        currentStages = [NINE_GODS[s1], NINE_GODS[s2], NINE_GODS[s3]];
    }

    async function startAnalysisFlow() {
        let rawInput = document.getElementById("questionInput").value.trim();
        if (rawInput.length < 2) { alert("请录入需要推演的数据描述"); return; }
        
        userQuestion = rawInput;
        document.getElementById("inputSection").classList.add("hidden");
        document.getElementById("loadingState").classList.remove("hidden");

        const loadingTexts = ["正在接入位面数据...", "计算环境权重...", "解密因果逻辑...", "生成推演报告..."];
        let step = 0;
        const itv = setInterval(() => {
            if(step < loadingTexts.length) document.getElementById("loadingText").innerText = loadingTexts[step++];
        }, 2000);

        try {
            await callAI();
            clearInterval(itv);
            document.getElementById("loadingState").classList.add("hidden");
            document.getElementById("resultSection").classList.remove("hidden");
            
            document.getElementById("teaserGod1").innerText = currentStages[0].name;
            document.getElementById("teaserGod2").innerText = currentStages[1].name;
            document.getElementById("teaserGod3").innerText = currentStages[2].name;
        } catch (e) {
            clearInterval(itv);
            alert("系统负载过高，请稍后重试");
        }
    }

    async function callAI() {
        const SPLIT_TAG = "|||BREAK|||";
        const godComb = currentStages.map(g => g.name).join(" -> ");
        
        const systemPrompt = `你现在是《地球 Online》底层模拟终端的决策推演AI。
        你的任务是基于玩家输入的现实场景和系统生成的“位面参数”（小六壬九神），输出一份推演报告。
        
        **规范要求**：
        1. **语言风格**：严禁玄学词汇（如算命、占卜、缘主、命里、福报等）。
        2. **替代词**：改用推演、位面参数、系统判定、NPC互动策略、因果脚本、逻辑漏洞等。
        3. **输出格式**：HTML格式，包含两个板块，用 ${SPLIT_TAG} 分隔。`;

        const userPrompt = `
        玩家场景：${userQuestion}
        位面参数：${godComb}

        请输出HTML：
        <p><strong>[环境判定]</strong> (结合参数直接给出系统对该场景的吉凶评级和主要矛盾点)</p>
        <p><strong>[运行逻辑]</strong> (分析当前位面参数下，该事件背后的演化规律)</p>
        ${SPLIT_TAG}
        <p><strong>[核心解密]</strong> (基于高维视角的深度建议)</p>
        <p><strong>[通关策略]</strong> (给出具体的策略建议：该不该动、怎么动、关键变量点)</p>`;

        try {
            const response = await fetch("https://api.siliconflow.cn/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${CONFIG.apiToken}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "deepseek-ai/DeepSeek-V3",
                    messages: [{role: "system", content: systemPrompt}, {role: "user", content: userPrompt}],
                    temperature: 0.7
                })
            });
            const data = await response.json();
            const content = data.choices[0].message.content;
            const parts = content.split(SPLIT_TAG);
            
            document.getElementById("freeAnalysisContent").innerHTML = parts[0];
            document.getElementById("paidAnalysisContent").innerHTML = parts[1];
        } catch (e) {
            throw e;
        }
    }

    function startPayment(amount) {
        const payData = {
            pid: CONFIG.paymentId,
            money: amount,
            name: "地球Online-赞助",
            notify_url: CONFIG.notifyUrl,
            out_trade_no: "SP" + Date.now(),
            return_url: window.location.href.split('?')[0] + "?status=thankyou",
            sitename: "EarthOnline",
            type: "alipay"
        };
        const sorted = Object.keys(payData).sort().map(k => `${k}=${payData[k]}`).join('&');
        payData.sign = md5(sorted + CONFIG.paymentKey);
        payData.sign_type = "MD5";
        const form = document.createElement('form');
        form.method = 'POST'; form.action = CONFIG.submitUrl;
        Object.keys(payData).forEach(k => {
            const i = document.createElement('input'); i.type='hidden'; i.name=k; i.value=payData[k]; form.appendChild(i);
        });
        document.body.appendChild(form); form.submit();
    }

    function checkPaymentResult() {
        if (new URLSearchParams(window.location.search).get('status') === 'thankyou') {
            alert("感谢您的赞助，能量已接收！系统将继续稳定运行。");
            window.history.replaceState({}, '', window.location.pathname);
        }
    }

    function copyResult() {
        const text = document.getElementById("fullReport").innerText;
        const temp = document.createElement("textarea");
        temp.value = "【地球 Online 系统推演报告】\n\n" + text;
        document.body.appendChild(temp); temp.select();
        document.execCommand("copy");
        document.body.removeChild(temp);
        alert("完整报告已存入剪贴板");
    }

    function sharePage() {
        navigator.clipboard.writeText(window.location.href.split('?')[0]);
        alert("终端链接已复制");
    }
  </script>
</body>
</html>
