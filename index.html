<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Earth Online - 系统策略解析终端</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/lunar-javascript@1.2.37/lunar.min.js"></script>
  <script src="https://cdn.bootcdn.net/ajax/libs/blueimp-md5/2.16.0/js/md5.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#00FFC2", // 赛博荧光绿
            secondary: "#D8B4FE", 
            accent: "#1677FF", 
            bgStart: "#020617", 
            bgEnd: "#0F172A",   
          },
          fontFamily: {
            mono: ["Fira Code", "Source Code Pro", "monospace"],
            sans: ["PingFang SC", "Microsoft YaHei", "sans-serif"],
          },
          animation: {
            "matrix-fade": "fadeIn 0.5s ease-in-out",
            "glitch": "glitch 1s infinite",
            "scroll-left": "scrollLeft 60s linear infinite",
          },
          keyframes: {
            scrollLeft: {
              '0%': { transform: 'translateX(0)' },
              '100%': { transform: 'translateX(-50%)' },
            }
          }
        },
      },
    };
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
        .text-neon { color: #00FFC2; text-shadow: 0 0 10px rgba(0, 255, 194, 0.6); }
        .bg-cyber { background: radial-gradient(circle at center, #0F172A 0%, #020617 100%); }
        .card-terminal { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(0, 255, 194, 0.2); box-shadow: 0 0 20px rgba(0, 0, 0, 0.5); }
        .blur-lock { filter: blur(15px); user-select: none; pointer-events: none; }
        .lock-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(2, 6, 23, 0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
    }
    body { background-color: #020617; color: #E2E8F0; font-family: 'PingFang SC', sans-serif; }
    .loading-bar { width: 100px; height: 2px; background: #1E293B; position: relative; overflow: hidden; }
    .loading-bar::after { content: ''; position: absolute; left: -100%; width: 100%; height: 100%; background: #00FFC2; animation: loading 1.5s infinite; }
    @keyframes loading { 100% { left: 100%; } }
  </style>
</head>

<body class="bg-cyber min-h-screen">

  <!-- 顶部导航 -->
  <div class="fixed top-0 w-full z-50 bg-black/60 backdrop-blur-md border-b border-emerald-500/20">
    <div class="max-w-md mx-auto px-4 h-14 flex items-center justify-between">
      <div class="flex items-center">
        <span class="text-xl mr-2 text-neon"><i class="fa fa-terminal"></i></span>
        <span class="font-bold text-neon tracking-wider font-mono">EARTH ONLINE</span>
      </div>
      <button onclick="sharePage()" class="text-xs border border-emerald-500/40 text-emerald-400 px-3 py-1 rounded hover:bg-emerald-500/10 transition-all">
        [保存数据]
      </button>
    </div>
  </div>

  <!-- 主容器 -->
  <div class="max-w-md mx-auto pt-24 pb-24 px-4 relative">
    
    <!-- 标题 -->
    <div class="text-center mb-10">
      <h1 class="text-4xl font-black text-neon mb-2 tracking-tighter italic">地球 Online</h1>
      <p class="text-emerald-500/60 text-[10px] font-mono tracking-widest uppercase">
        Ver 2025.1.0 - 系统底层参数解析终端
      </p>
    </div>

    <!-- 实时服务器环境数据 -->
    <div class="card-terminal rounded-lg p-4 mb-8 font-mono text-[11px]">
        <div class="flex justify-between items-center text-emerald-400/80">
            <div>
                <span class="opacity-50">Local_Time:</span>
                <span id="solarDate"></span>
            </div>
            <div class="text-right">
                <span class="opacity-50">Node_ID:</span>
                <span id="lunarDate"></span>
            </div>
        </div>
    </div>

    <!-- 核心输入区 -->
    <div id="inputSection" class="relative z-20">
      <div class="card-terminal rounded-xl p-6 shadow-2xl">
        <div class="flex items-center mb-4">
            <div class="w-1.5 h-4 bg-neon mr-3"></div>
            <h3 class="text-sm font-bold text-white tracking-widest font-mono">输入待解析的副本/关卡：</h3>
        </div>
        <textarea id="questionInput" 
          placeholder="例如：
• [职业] 目标公司OFFER获取概率
• [情感] 目标NPC互动关系演化
• [财富] 当前资产包的风险权重解析
• [任务] 某个决策是否触发Bad Ending？

(请输入具体的场景描述...)"
          class="w-full h-40 bg-black/40 border border-emerald-500/20 rounded-lg p-4 text-emerald-100 focus:border-neon focus:ring-0 outline-none transition-all placeholder-emerald-900 font-mono text-sm resize-none"></textarea>
        
        <div class="mt-6">
            <button onclick="startAnalysisFlow()"
              class="w-full bg-emerald-600 hover:bg-emerald-500 text-black font-black py-4 rounded shadow-[0_0_15px_rgba(16,185,129,0.4)] active:scale-[0.98] transition-all flex items-center justify-center group">
              <span class="text-base tracking-[0.2em]">运行系统模拟脚本</span>
            </button>
            <p class="text-center text-[10px] text-emerald-500/40 mt-4 font-mono">
                当前有 <span class="text-neon" id="visitorCount">--</span> 位玩家正在解析...
            </p>
        </div>
      </div>
    </div>

    <!-- 加载中 -->
    <div id="loadingState" class="hidden py-20 text-center font-mono">
        <div class="loading-bar mx-auto mb-6"></div>
        <p class="text-neon text-lg mb-2">正在挂载元数据...</p>
        <p class="text-emerald-500/50 text-xs animate-pulse" id="loadingText">Requesting Server Access...</p>
    </div>

    <!-- 结果展示 -->
    <div id="resultSection" class="hidden">
        
        <div class="card-terminal rounded-xl p-5 mb-4">
            <div class="text-center mb-6">
                <span class="text-neon border border-neon/30 px-4 py-1 rounded text-[10px] font-mono">ENVIRONMENT_PARAMETERS</span>
            </div>
            <div class="grid grid-cols-3 gap-2 mb-6 text-center font-mono">
                <div class="bg-emerald-500/5 p-2 border border-emerald-500/10">
                    <div class="text-[9px] text-emerald-500/40 mb-1">维度A</div>
                    <div class="text-sm font-bold text-white" id="teaserGod1">--</div>
                </div>
                <div class="bg-emerald-500/5 p-2 border border-emerald-500/10">
                    <div class="text-[9px] text-emerald-500/40 mb-1">权重B</div>
                    <div class="text-sm font-bold text-white" id="teaserGod2">--</div>
                </div>
                <div class="bg-emerald-500/5 p-2 border border-emerald-500/10">
                    <div class="text-[9px] text-emerald-500/40 mb-1">判定C</div>
                    <div class="text-sm font-bold text-white" id="teaserGod3">--</div>
                </div>
            </div>
            
            <!-- 免费分析 -->
            <div class="mb-2">
                <div class="flex items-center mb-3 border-l-2 border-neon pl-3">
                    <h3 class="text-sm font-bold text-white font-mono">系统日志输出 (Log)</h3>
                </div>
                <div id="freeAnalysisContent" class="text-emerald-100/90 text-sm leading-7 font-mono opacity-90 min-h-[80px]"></div>
            </div>
        </div>

        <!-- 付费墙 -->
        <div id="paidContentContainer" class="relative overflow-hidden rounded-xl border border-emerald-500/30">
            <div id="paidContentBlur" class="bg-white/5 p-6 blur-lock">
                <h3 class="font-bold text-sm mb-4 text-neon flex items-center font-mono">
                    > 查看开发者攻略 (v0.1)
                </h3>
                <div id="paidAnalysisContent" class="text-emerald-100/60 text-xs leading-relaxed font-mono">
                    <p class="mb-2">检测到关键逻辑缺失...</p>
                    <p>正在尝试解密高维数据... 权限不足。</p>
                </div>
            </div>

            <!-- 支付遮罩 -->
            <div id="payOverlay" class="lock-overlay p-6 text-center">
                <div class="mb-6">
                    <i class="fa fa-lock text-3xl text-neon mb-4"></i>
                    <h3 class="text-lg font-bold text-white mb-1">获取完整策略分析</h3>
                    <p class="text-emerald-500/60 text-[10px] font-mono">赞助以获取高级扩展包数据</p>
                </div>
                
                <div class="grid grid-cols-2 gap-4 w-full mb-4">
                    <button id="btn-tier-1" onclick="startPayment('1.68')" class="bg-black/80 border border-emerald-500/30 hover:border-neon text-white py-4 rounded font-mono active:scale-95 transition-all">
                        <span class="block text-neon font-bold text-lg">¥ 1.68</span>
                        <span class="text-[9px] opacity-50" id="label-tier-1">微光赞助</span>
                    </button>
                    <button onclick="startPayment('8.88')" class="bg-emerald-950/40 border border-neon text-white py-4 rounded font-mono active:scale-95 transition-all relative overflow-hidden">
                        <div class="absolute top-0 right-0 bg-neon text-black font-bold text-[8px] px-1 italic">HOT</div>
                        <span class="block text-white font-bold text-lg">¥ 8.88</span>
                        <span class="text-[9px] text-neon/80">核心赞助</span>
                    </button>
                </div>
                
                <p class="text-[10px] text-emerald-500/30">支持支付宝 · 极客隐私保护</p>
            </div>
        </div>

        <div id="resultActions" class="mt-6 flex space-x-3 hidden font-mono">
            <button onclick="copyResult()" class="flex-1 border border-emerald-500/20 text-emerald-500 py-3 rounded text-xs hover:bg-emerald-500/5">
                [拷贝Log数据]
            </button>
            <button onclick="location.href=location.pathname" class="flex-1 bg-emerald-500/10 text-neon py-3 rounded text-xs hover:bg-emerald-500/20 border border-neon/30">
                [重置模拟器]
            </button>
        </div>
    </div>
    
    <!-- 滚动信息栏 -->
    <div class="fixed bottom-0 left-0 right-0 bg-black/80 backdrop-blur border-t border-emerald-500/10 py-1 z-40">
        <div class="relative w-full overflow-hidden h-5">
            <div id="marqueeContent" class="absolute whitespace-nowrap animate-scroll-left text-[9px] text-emerald-500/40 font-mono flex items-center space-x-12 px-4">
            </div>
        </div>
    </div>
  </div>

  <script>
    const CONFIG = {
        freeCode: "xiaoliuren.xyz", 
        discountCode: "玩家代码",   
        discountPrice: "1.00",      
        vipCodes: ["xiaoliuren.xyz", "玩家代码"],
        
        apiToken: "sk-zhkdhbaohshweaxxzxlvvucvklmlwsepbzmmghkxxkrfwpli", 
        paymentId: "2025111020404744", 
        paymentKey: "6Ecg3jrd3W4jcOADKclHaU0N5AsWftbB", 
        notifyUrl: "http://www.xiaoliuren.xyz", 
        submitUrl: "https://z-pay.cn/submit.php"
    };

    const NINE_GODS = [
      { name: "大安", type: "Stable" }, { name: "留连", type: "Delay" }, { name: "速喜", type: "Fast" },
      { name: "赤口", type: "Conflict" }, { name: "小吉", type: "Success" }, { name: "空亡", type: "Null" },
      { name: "病符", type: "Error" }, { name: "桃花", type: "Social" }, { name: "天德", type: "Buff" }
    ];
    const SHICHEN = ["子", "丑", "寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥"];

    let currentStages = []; 
    let userQuestion = "";  

    document.addEventListener("DOMContentLoaded", function () {
      updateTimeDisplay();
      generateDailyVisitorCount();
      generateRealisticMarquee();
      checkPaymentResult();
    });

    function generateDailyVisitorCount() {
        document.getElementById("visitorCount").innerText = (Math.floor(Math.random() * 500) + 800).toLocaleString();
    }

    function generateRealisticMarquee() {
        const actions = ["赞助了 1.68 获取策略建议", "成功通关 职场副本", "解密了 情感交互脚本", "更新了 系统权重参数", "通过赞助 获取了S级建议"];
        let contentHtml = "";
        for (let i = 0; i < 15; i++) {
            const userId = Math.floor(Math.random()*9+1) + "***" + Math.floor(Math.random()*9);
            const action = actions[Math.floor(Math.random() * actions.length)];
            contentHtml += `<span class="flex items-center"> [ID:${userId}] ${action} </span>`;
        }
        document.getElementById("marqueeContent").innerHTML = contentHtml + contentHtml;
    }

    function updateTimeDisplay() {
        const now = new Date();
        const solar = Solar.fromDate(now);
        const lunar = solar.getLunar();
        document.getElementById("solarDate").innerText = solar.toFullString().split(' ')[0];
        const hour = now.getHours();
        let shichenIdx = Math.floor((hour + 1) / 2) % 12;
        document.getElementById("lunarDate").innerText = `LV-${lunar.getMonth()}.${lunar.getDay()}.${SHICHEN[shichenIdx]}`;
        
        const m = Math.abs(lunar.getMonth()); 
        const d = lunar.getDay();
        const t = shichenIdx + 1; 
        const s1 = (m - 1) % 9;
        const s2 = (s1 + d - 1) % 9;
        const s3 = (s2 + t - 1) % 9;
        currentStages = [NINE_GODS[s1], NINE_GODS[s2], NINE_GODS[s3]];
    }

    async function startAnalysisFlow() {
        let rawInput = document.getElementById("questionInput").value.trim();
        if (rawInput.length < 2) { alert("请输入需要解析的数据场景"); return; }
        userQuestion = rawInput;
        document.getElementById("inputSection").classList.add("hidden");
        document.getElementById("loadingState").classList.remove("hidden");

        const loadingTexts = ["正在连接服务器...", "同步位面数据...", "计算环境权重...", "生成建议脚本..."];
        let step = 0;
        const itv = setInterval(() => {
            if(step < loadingTexts.length) document.getElementById("loadingText").innerText = loadingTexts[step++];
        }, 2000);

        try {
            await callAI(rawInput.includes(CONFIG.freeCode));
            clearInterval(itv);
            showResultPage(rawInput.includes(CONFIG.freeCode));
        } catch (e) {
            clearInterval(itv);
            showResultPage(false);
        }
    }

    function showResultPage(isUnlocked) {
        document.getElementById("loadingState").classList.add("hidden");
        document.getElementById("resultSection").classList.remove("hidden");
        document.getElementById("teaserGod1").innerText = currentStages[0].name;
        document.getElementById("teaserGod2").innerText = currentStages[1].name;
        document.getElementById("teaserGod3").innerText = currentStages[2].name;
        if(isUnlocked) unlockContent();
    }

    function unlockContent() {
        document.getElementById("paidContentBlur").classList.remove("blur-lock");
        document.getElementById("payOverlay").classList.add("hidden");
        document.getElementById("resultActions").classList.remove("hidden");
    }

    async function callAI(isUnlocked) {
        const SPLIT_TAG = "|||SPLIT|||";
        const godComb = currentStages.map(g => g.name).join("->");
        
        // 系统管理员提示词
        const systemPrompt = `你现在是《地球 Online》的系统底层管理员。
        你需要为玩家解析他们遇到的现实问题。
        请将中国传统术语转化为游戏开发/系统运维术语。
        例如：
        - 结果吉凶 -> 运行判定 (Success/Error/Warning)
        - 运势 -> 系统环境参数/权重
        - 建议 -> 通关策略/脚本优化
        
        必须包含两部分，用 ${SPLIT_TAG} 分隔。`;

        const userPrompt = `
        玩家场景描述：${userQuestion}
        系统底层参数：${godComb}
        请直接输出HTML：
        <p><strong>[系统判定]</strong> (简短分析当前局面吉凶)</p>
        <p><strong>[环境分析]</strong> (分析现状的逻辑)</p>
        ${SPLIT_TAG}
        <h4>[核心解密]</h4>
        <p>(深度分析逻辑)</p>
        <h4>[开发者攻略建议]</h4>
        <ul>
        <li><strong>副本难度：</strong> (极高/中等/简单)</li>
        <li><strong>具体策略：</strong> (给出3条针对性的建议)</li>
        </ul>`;

        try {
            const res = await fetch("https://api.siliconflow.cn/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${CONFIG.apiToken}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "deepseek-ai/DeepSeek-V3",
                    messages: [{role: "system", content: systemPrompt}, {role: "user", content: userPrompt}],
                    temperature: 0.7
                })
            });
            const data = await res.json();
            const content = data.choices[0].message.content;
            const parts = content.split(SPLIT_TAG);
            document.getElementById("freeAnalysisContent").innerHTML = parts[0];
            document.getElementById("paidAnalysisContent").innerHTML = parts[1];
            
            localStorage.setItem('cf_cached_gods', JSON.stringify(currentStages));
            localStorage.setItem('cf_cached_free', parts[0]);
            localStorage.setItem('cf_cached_paid', parts[1]);
        } catch (e) {
            document.getElementById("freeAnalysisContent").innerHTML = "数据同步失败，请刷新重试。";
        }
    }

    function startPayment(amount) {
        localStorage.setItem('cf_question', userQuestion);
        const payData = {
            pid: CONFIG.paymentId,
            money: amount,
            name: "EarthOnline-策略包",
            notify_url: CONFIG.notifyUrl,
            out_trade_no: Date.now(),
            return_url: window.location.href.split('?')[0] + "?status=paid",
            sitename: "EarthOnline",
            type: "alipay"
        };
        const sorted = Object.keys(payData).sort().map(k => `${k}=${payData[k]}`).join('&');
        payData.sign = md5(sorted + CONFIG.paymentKey);
        payData.sign_type = "MD5";
        const form = document.createElement('form');
        form.method = 'POST'; form.action = CONFIG.submitUrl;
        Object.keys(payData).forEach(k => {
            const i = document.createElement('input'); i.type='hidden'; i.name=k; i.value=payData[k]; form.appendChild(i);
        });
        document.body.appendChild(form); form.submit();
    }

    function checkPaymentResult() {
        const p = new URLSearchParams(window.location.search);
        if (p.get('status') === 'paid') {
            const f = localStorage.getItem('cf_cached_free');
            const pa = localStorage.getItem('cf_cached_paid');
            if(f && pa) {
                document.getElementById("inputSection").classList.add("hidden");
                document.getElementById("resultSection").classList.remove("hidden");
                document.getElementById("freeAnalysisContent").innerHTML = f;
                document.getElementById("paidAnalysisContent").innerHTML = pa;
                unlockContent();
                window.history.replaceState({},'',window.location.pathname);
            }
        }
    }

    function copyResult() {
        const text = document.getElementById("resultSection").innerText;
        navigator.clipboard.writeText(text);
        alert("Log数据已存入剪贴板");
    }

    function sharePage() {
        navigator.clipboard.writeText(window.location.href);
        alert("终端链接已复制");
    }
  </script>
</body>
</html>
